<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — DummyStore</title>
  <meta name="description" content="Reset your DummyStore password.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div id="navbar-container"></div>

  <section class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8 fade-in">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: var(--btn-bg);">
          <span style="color: var(--btn-text); font-weight:800; font-size:1.5rem; font-family:'Outfit',sans-serif;">D</span>
        </div>
        <h1 class="text-3xl font-bold" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Forgot Password</h1>
        <p class="mt-2 text-sm" style="color: var(--color-text-muted);">Enter your email and we'll send you a reset link</p>
      </div>

      <!-- Step 1: Email -->
      <div class="glass-card rounded-2xl p-6 md:p-8 fade-in" id="forgot-step-1">
        <form onsubmit="handleForgotPassword(event)">
          <div class="mb-5">
            <label class="block text-sm font-medium mb-2" style="color: var(--color-text);">Email Address</label>
            <input type="email" id="forgot-email" placeholder="you@example.com" class="glass-input" required>
          </div>
          <div id="forgot-error" class="hidden mb-4 p-3 rounded-xl text-sm" style="background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2);"></div>
          <button type="submit" id="forgot-btn" class="btn-primary w-full py-3 rounded-xl text-sm">
            <span id="forgot-btn-text">Send Reset Link</span>
            <span id="forgot-spinner" class="hidden">
              <svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            </span>
          </button>
        </form>

        <div class="mt-5 text-center">
          <a href="login.html" class="text-sm font-medium hover:underline" style="color: var(--color-text-muted);">← Back to Login</a>
        </div>
      </div>

      <!-- Step 2: Success -->
      <div class="glass-card rounded-2xl p-6 md:p-8 fade-in hidden" id="forgot-step-2">
        <div class="text-center">
          <div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: rgba(16,185,129,0.12);">
            <span class="text-3xl">📧</span>
          </div>
          <h2 class="text-xl font-bold mb-2" style="font-family:'Outfit'; color: var(--color-text);">Check Your Email</h2>
          <p class="text-sm mb-1" style="color: var(--color-text-muted);">We've sent a password reset link to:</p>
          <p class="text-sm font-semibold mb-6" style="color: var(--color-text);" id="sent-email"></p>
          <div class="p-3 rounded-xl mb-5" style="background: var(--glass-bg);">
            <p class="text-xs" style="color: var(--color-text-muted);">💡 Didn't receive the email? Check your spam folder or <button onclick="document.getElementById('forgot-step-2').classList.add('hidden');document.getElementById('forgot-step-1').classList.remove('hidden')" class="underline font-medium" style="color:var(--color-text);background:none;border:none;cursor:pointer">try again</button></p>
          </div>
          <a href="reset-password.html" class="btn-primary rounded-xl inline-flex py-2.5 px-6 text-sm">Open Reset Page</a>
          <div class="mt-4">
            <a href="login.html" class="text-sm font-medium hover:underline" style="color: var(--color-text-muted);">← Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script>
    function handleForgotPassword(event) {
      event.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const errorEl = document.getElementById('forgot-error');
      const btnText = document.getElementById('forgot-btn-text');
      const spinner = document.getElementById('forgot-spinner');

      errorEl.classList.add('hidden');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.classList.remove('hidden');
        return;
      }

      // Show loading
      btnText.classList.add('hidden');
      spinner.classList.remove('hidden');

      // Simulate API call
      setTimeout(() => {
        btnText.classList.remove('hidden');
        spinner.classList.add('hidden');
        // Show success
        document.getElementById('forgot-step-1').classList.add('hidden');
        document.getElementById('forgot-step-2').classList.remove('hidden');
        document.getElementById('sent-email').textContent = email;
        showToast('Reset link sent!', 'success');
      }, 1500);
    }
  </script>
</body>
</html>
