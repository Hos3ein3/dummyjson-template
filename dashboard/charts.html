<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charts — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="mesh-bg"></div>
  <div id="app" class="dash-layout">
    <aside class="dash-sidebar" id="sidebar-container"></aside>
    <div class="dash-main">
      <header class="dash-topbar" id="topbar-container"></header>
      <main class="dash-content">
        <h1 class="text-2xl font-bold mb-1" style="font-family:'Outfit';color:var(--color-text)">Charts & Graphs</h1>
        <p class="text-sm mb-6" style="color:var(--color-text-muted)">Line, bar, pie, doughnut, radar, area & mixed charts</p>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <!-- Line Chart -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-line"></canvas></div></div>

          <!-- Bar Chart -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-bar"></canvas></div></div>

          <!-- Horizontal Bar -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-hbar"></canvas></div></div>

          <!-- Pie Chart -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-pie"></canvas></div></div>

          <!-- Doughnut -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-doughnut"></canvas></div></div>

          <!-- Radar -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-radar"></canvas></div></div>

          <!-- Area Chart -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-area"></canvas></div></div>

          <!-- Mixed Chart -->
          <div class="dash-card"><div style="height:300px"><canvas id="chart-mixed"></canvas></div></div>
        </div>

      </main>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="js/dashboard-core.js"></script>
  <script src="js/charts-init.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initDashboard([{label:'Visuals'},{label:'Charts & Graphs'}]);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      createLineChart('chart-line', months,
        [{ label: 'Revenue ($K)', data: [12,19,14,22,18,25,28,24,30,26,33,38] },
         { label: 'Expenses ($K)', data: [8,11,10,14,12,16,18,15,20,17,22,25], fill: false }],
        'Monthly Revenue vs Expenses'
      );

      createBarChart('chart-bar', ['Electronics','Clothing','Furniture','Beauty','Groceries','Sports','Books'],
        [{ label: 'Sales', data: [450,380,290,340,510,200,150] }],
        'Sales by Category'
      );

      createBarChart('chart-hbar', ['Product A','Product B','Product C','Product D','Product E'],
        [{ label: 'Units Sold', data: [120,98,86,74,65] }],
        'Top Products', true
      );

      createPieChart('chart-pie', ['Direct','Social','Email','Referral','Organic'],
        [35, 25, 20, 10, 10], 'Traffic Sources'
      );

      createDoughnutChart('chart-doughnut',
        ['Completed','In Progress','Pending','Cancelled'],
        [45, 25, 20, 10], 'Order Status', '1,248'
      );

      createRadarChart('chart-radar',
        ['Speed','Reliability','Comfort','Safety','Efficiency','Design'],
        [{ label: 'Product A', data: [85,90,80,95,70,88] },
         { label: 'Product B', data: [70,85,95,80,90,75] }],
        'Product Comparison'
      );

      createAreaChart('chart-area', months,
        [{ label: 'Users', data: [100,150,180,220,280,350,400,380,420,460,500,560] },
         { label: 'Sessions', data: [200,280,320,400,500,620,700,680,740,800,850,920] }],
        'User Growth'
      );

      createMixedChart('chart-mixed', months,
        { label: 'Orders', data: [30,45,35,50,42,55,60,52,65,58,70,78] },
        { label: 'Avg Order Value ($)', data: [42,38,45,40,48,43,50,47,52,49,55,53] },
        'Orders & Average Value'
      );
    });
  </script>
</body>
</html>
