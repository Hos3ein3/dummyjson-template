<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quotes — Dashboard</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script><link rel="stylesheet" href="../css/styles.css"><link rel="stylesheet" href="css/dashboard.css"></head><body><div class="mesh-bg"></div><div id="app" class="dash-layout"><aside class="dash-sidebar" id="sidebar-container"></aside><div class="dash-main"><header class="dash-topbar" id="topbar-container"></header><main class="dash-content">
<h1 class="text-2xl font-bold mb-1" style="font-family:'Outfit';color:var(--color-text)">Quotes</h1>
<p class="text-sm mb-6" style="color:var(--color-text-muted)">Inspirational quotes collection</p>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="quotes-grid"><div class="partial-loader col-span-3"><div class="spinner"></div></div></div>
</main></div></div><script src="../js/api.js"></script><script src="js/dashboard-core.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  initDashboard([{label:'Content'},{label:'Quotes'}]);
  try{
    const d=await api.get('/quotes?limit=15');
    const colors=['var(--color-accent)','var(--success)','#8B5CF6','var(--star)','var(--error)','#EC4899'];
    document.getElementById('quotes-grid').innerHTML=d.quotes.map((q,i)=>`
      <div class="dash-card" style="border-left:3px solid ${colors[i%6]}">
        <p class="text-sm italic mb-3" style="color:var(--color-text)">"${q.quote}"</p>
        <p class="text-xs font-semibold" style="color:${colors[i%6]}">— ${q.author}</p>
      </div>`).join('');
  }catch(e){}
});
</script></body></html>
