<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Text Editor — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  
  <!-- Quill CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/rich-editor.css">
</head>
<body>
  <div class="mesh-bg"></div>
  <div id="app" class="dash-layout">
    <aside class="dash-sidebar" id="sidebar-container"></aside>
    <div class="dash-main">
      <header class="dash-topbar" id="topbar-container"></header>
      <main class="dash-content">
        <h1 class="text-2xl font-bold mb-1" style="font-family:'Outfit';color:var(--color-text)">Advanced Rich Text Editor</h1>
        <p class="text-sm mb-6" style="color:var(--color-text-muted)">Full-featured WYSIWYG editor with slash commands, blocks, and media support.</p>

        <div class="dash-card p-0 overflow-visible" style="padding:0">
          
          <!-- Custom Toolbar Container -->
          <div id="quill-toolbar-container" class="editor-toolbar">
            <!-- History -->
            <span class="ql-formats">
              <button class="ql-undo" title="Undo">↩️</button>
              <button class="ql-redo" title="Redo">↪️</button>
              <button class="ql-clean" title="Clear Formatting">🧽</button>
            </span>
            
            <div class="toolbar-divider"></div>
            
            <!-- Typography -->
            <span class="ql-formats">
              <select class="ql-font" title="Font Family">
                <option selected>Inter</option>
                <option value="serif">Serif</option>
                <option value="monospace">Monospace</option>
                <option value="Outfit">Outfit</option>
                <option value="Roboto">Roboto</option>
              </select>
              <select class="ql-size" title="Font Size">
                <option value="10px">Small</option>
                <option selected>Normal</option>
                <option value="18px">Large</option>
                <option value="32px">Huge</option>
              </select>
            </span>

            <div class="toolbar-divider"></div>

            <!-- Blocks -->
            <span class="ql-formats">
              <select class="ql-header" title="Heading">
                <option value="1">Heading 1</option>
                <option value="2">Heading 2</option>
                <option value="3">Heading 3</option>
                <option selected>Paragraph</option>
              </select>
            </span>

            <div class="toolbar-divider"></div>
            
            <!-- Inline Styles -->
            <span class="ql-formats">
              <button class="ql-bold" title="Bold"></button>
              <button class="ql-italic" title="Italic"></button>
              <button class="ql-underline" title="Underline"></button>
              <button class="ql-strike" title="Strikethrough"></button>
              <button class="ql-script" value="sub" title="Subscript"></button>
              <button class="ql-script" value="super" title="Superscript"></button>
              <button class="ql-code" title="Inline Code"></button>
            </span>
            
            <div class="toolbar-divider"></div>
            
            <!-- Colors -->
            <span class="ql-formats">
              <select class="ql-color" title="Text Color"></select>
              <select class="ql-background" title="Background Color"></select>
            </span>
            
            <div class="toolbar-divider"></div>
            
            <!-- Paragraph Alignment -->
            <span class="ql-formats">
              <button class="ql-align" value="" title="Align Left"></button>
              <button class="ql-align" value="center" title="Align Center"></button>
              <button class="ql-align" value="right" title="Align Right"></button>
              <button class="ql-align" value="justify" title="Justify"></button>
            </span>
            
            <div class="toolbar-divider"></div>
            
            <!-- Lists & Indent -->
            <span class="ql-formats">
              <button class="ql-list" value="ordered" title="Numbered List"></button>
              <button class="ql-list" value="bullet" title="Bullet List"></button>
              <button class="ql-list" value="check" title="Task List"></button>
              <button class="ql-indent" value="-1" title="Decrease Indent"></button>
              <button class="ql-indent" value="+1" title="Increase Indent"></button>
            </span>
            
            <div class="toolbar-divider"></div>
            
            <!-- Blocks II -->
            <span class="ql-formats">
              <button class="ql-blockquote" title="Quote"></button>
              <button class="ql-code-block" title="Code Block"></button>
            </span>
            
            <div class="toolbar-divider"></div>
            
            <!-- Media -->
            <span class="ql-formats">
              <button class="ql-link" title="Link"></button>
              <button class="ql-image" title="Image"></button>
              <button class="ql-video" title="Video"></button>
            </span>
          </div>

          <!-- Slash Command Overlay (Hidden by default) -->
          <div id="slash-commands" class="slash-command-menu" style="display:none">
            <div class="cmd-item" data-action="h1"><span class="cmd-icon">H1</span><div class="cmd-text">Heading 1</div></div>
            <div class="cmd-item" data-action="h2"><span class="cmd-icon">H2</span><div class="cmd-text">Heading 2</div></div>
            <div class="cmd-item" data-action="quote"><span class="cmd-icon">❞</span><div class="cmd-text">Quote</div></div>
            <div class="cmd-item" data-action="code"><span class="cmd-icon">{}</span><div class="cmd-text">Code Block</div></div>
            <div class="cmd-item" data-action="divider"><span class="cmd-icon">―</span><div class="cmd-text">Divider</div></div>
          </div>

          <!-- Bubble Menu (Hidden by default) -->
          <div id="bubble-menu" class="bubble-menu" style="display:none">
            <button class="b-btn" data-format="bold">B</button>
            <button class="b-btn" data-format="italic">I</button>
            <button class="b-btn" data-format="underline">U</button>
            <button class="b-btn" data-format="link">🔗</button>
          </div>
          
          <div class="editor-content-wrapper">
            <div id="rich-editor-container"></div>
          </div>

          <div class="editor-footer">
            <div id="editor-stats" class="text-xs text-gray-500 font-medium">0 words · 0 chars · ~0 min read</div>
            <div class="flex gap-2">
              <button class="btn-ghost btn-sm" onclick="exportDoc('md')">Export MD</button>
              <button class="btn-ghost btn-sm" onclick="exportDoc('html')">Export HTML</button>
              <button class="btn-primary rounded-lg btn-sm" onclick="saveContent()">Save Draft</button>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Quill JS -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  
  <script src="../js/api.js"></script>
  <script src="js/dashboard-core.js"></script>
  <script src="js/rich-editor.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initDashboard([{label:'Forms'},{label:'Advanced Editor'}]);
    });
  </script>
</body>
</html>
