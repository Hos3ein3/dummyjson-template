<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Text Editor — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .editor-toolbar { display: flex; flex-wrap: wrap; gap: 0.25rem; padding: 0.5rem; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); border-radius: 0.75rem 0.75rem 0 0; }
    .editor-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 0.375rem; background: transparent; border: none; color: var(--color-text); cursor: pointer; transition: background 0.2s; }
    .editor-btn:hover { background: var(--glass-bg-hover); }
    .editor-btn.active { background: rgba(86,182,198,0.2); color: var(--btn-bg); }
    .editor-content { min-height: 300px; padding: 1rem; outline: none; line-height: 1.6; color: var(--color-text); }
    .editor-content img, .editor-content video { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }
    .editor-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    .editor-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
    .editor-content h1 { font-size: 2rem; font-weight: bold; margin: 1rem 0; }
    .editor-content h2 { font-size: 1.5rem; font-weight: bold; margin: 1rem 0; }
    .editor-content blockquote { border-left: 4px solid var(--btn-bg); padding-left: 1rem; margin: 1rem 0; font-style: italic; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>
  <div id="app" class="dash-layout">
    <aside class="dash-sidebar" id="sidebar-container"></aside>
    <div class="dash-main">
      <header class="dash-topbar" id="topbar-container"></header>
      <main class="dash-content">
        <h1 class="text-2xl font-bold mb-1" style="font-family:'Outfit';color:var(--color-text)">Rich Text Editor</h1>
        <p class="text-sm mb-6" style="color:var(--color-text-muted)">Word-like editor with rich text formatting and media embedding</p>

        <div class="dash-card p-0" style="padding:0">
          <div class="editor-toolbar" id="toolbar">
            <button class="editor-btn" onclick="formatDoc('undo')" title="Undo">↩️</button>
            <button class="editor-btn" onclick="formatDoc('redo')" title="Redo">↪️</button>
            <div style="width:1px; background:var(--glass-border); margin:0 0.25rem"></div>
            <button class="editor-btn" onclick="formatDoc('bold')" title="Bold"><b>B</b></button>
            <button class="editor-btn" onclick="formatDoc('italic')" title="Italic"><i>I</i></button>
            <button class="editor-btn" onclick="formatDoc('underline')" title="Underline"><u>U</u></button>
            <button class="editor-btn" onclick="formatDoc('strikethrough')" title="Strikethrough"><s>S</s></button>
            <button class="editor-btn" onclick="formatDoc('subscript')" title="Subscript">X<sub>2</sub></button>
            <button class="editor-btn" onclick="formatDoc('superscript')" title="Superscript">X<sup>2</sup></button>
            <div style="width:1px; background:var(--glass-border); margin:0 0.25rem"></div>
            <select class="glass-input" style="padding:0.25rem; font-size:0.8rem; height:32px" onchange="formatDoc('formatBlock', this.value); this.selectedIndex=0">
              <option value="" disabled selected>Format</option>
              <option value="H1">Heading 1</option>
              <option value="H2">Heading 2</option>
              <option value="H3">Heading 3</option>
              <option value="P">Paragraph</option>
              <option value="BLOCKQUOTE">Quote</option>
            </select>
            <select class="glass-input" style="padding:0.25rem; font-size:0.8rem; height:32px" onchange="formatDoc('fontSize', this.value); this.selectedIndex=0">
              <option value="" disabled selected>Size</option>
              <option value="1">Small</option>
              <option value="3">Normal</option>
              <option value="5">Large</option>
              <option value="7">Huge</option>
            </select>
            <div style="width:1px; background:var(--glass-border); margin:0 0.25rem"></div>
            <button class="editor-btn" id="btn-align-left" onclick="formatDoc('justifyLeft')" title="Align Left">L</button>
            <button class="editor-btn" id="btn-align-center" onclick="formatDoc('justifyCenter')" title="Align Center">C</button>
            <button class="editor-btn" id="btn-align-right" onclick="formatDoc('justifyRight')" title="Align Right">R</button>
            <button class="editor-btn" id="btn-align-justify" onclick="formatDoc('justifyFull')" title="Justify">J</button>
            <div style="width:1px; background:var(--glass-border); margin:0 0.25rem"></div>
            <button class="editor-btn" onclick="formatDoc('insertUnorderedList')" title="Bullet List">•</button>
            <button class="editor-btn" onclick="formatDoc('insertOrderedList')" title="Numbered List">1.</button>
            <div style="width:1px; background:var(--glass-border); margin:0 0.25rem"></div>
            <input type="color" class="w-8 h-8 rounded cursor-pointer" oninput="formatDoc('foreColor', this.value)" title="Text Color" style="padding:0; border:none; background:transparent">
            <input type="color" class="w-8 h-8 rounded cursor-pointer" value="#ffffff" oninput="formatDoc('hiliteColor', this.value)" title="Background Color" style="padding:0; border:none; background:transparent">
            <div style="width:1px; background:var(--glass-border); margin:0 0.25rem"></div>
            <button class="editor-btn" onclick="document.getElementById('img-upload').click()" title="Insert Image">🖼️</button>
            <button class="editor-btn" onclick="document.getElementById('vid-upload').click()" title="Insert Video">🎬</button>
            <button class="editor-btn" onclick="const url=prompt('Enter link URL:'); if(url) formatDoc('createLink', url)" title="Insert Link">🔗</button>
            <button class="editor-btn" onclick="formatDoc('unlink')" title="Remove Link">🚫</button>
          </div>
          <div class="editor-content" id="editor" contenteditable="true" spellcheck="false">
            <p>Welcome to the <b>Rich Text Editor</b>.</p>
            <p>You can type your content here, format it, and even embed media.</p>
          </div>
        </div>

        <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="insertMedia(this, 'image')">
        <input type="file" id="vid-upload" accept="video/*" style="display:none" onchange="insertMedia(this, 'video')">

        <div class="mt-6 flex justify-end">
          <button class="btn-primary rounded-xl" onclick="saveContent()">Save Document</button>
        </div>
      </main>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="js/dashboard-core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initDashboard([{label:'Visuals'},{label:'Rich Text Editor'}]);
    });

    function formatDoc(cmd, value=null) {
      document.execCommand(cmd, false, value);
      document.getElementById('editor').focus();
    }

    function insertMedia(input, type) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        const url = URL.createObjectURL(file);
        
        let html = '';
        if (type === 'image') {
          html = `<img src="${url}" alt="Embedded Image">`;
        } else if (type === 'video') {
          html = `<video controls src="${url}" style="max-width:100%; border-radius:0.5rem"></video>`;
        }
        
        document.getElementById('editor').focus();
        document.execCommand('insertHTML', false, html);
        // Reset input
        input.value = '';
      }
    }

    function saveContent() {
      const btn = document.querySelector('.btn-primary');
      btn.classList.add('btn-loading');
      setTimeout(() => {
        btn.classList.remove('btn-loading');
        dashToast('Document saved successfully!', 'success');
      }, 1000);
    }
  </script>
</body>
</html>
