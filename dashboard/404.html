<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="mesh-bg"></div>
  <div class="dash-card text-center relative z-10 p-10 max-w-md w-full anim-zoom">
    <div class="text-7xl mb-4 font-bold" style="color:var(--color-accent);font-family:'Outfit'">404</div>
    <h1 class="text-2xl font-bold mb-2" style="font-family:'Outfit';color:var(--color-text)">Page Not Found</h1>
    <p class="text-sm mb-8" style="color:var(--color-text-secondary)">The page you are looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn-primary rounded-xl px-8 py-3 inline-block">Return Home</a>
  </div>
</body>
</html>
