<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell { padding: 0.5rem; min-height: 80px; border: 1px solid var(--glass-border); border-radius: 0.5rem; cursor: pointer; transition: all 0.2s; position: relative; }
    .cal-cell:hover { background: var(--glass-bg-hover); }
    .cal-cell.is-today { font-weight: 700; border-color: var(--color-accent); background: rgba(86,182,198,0.05); }
    
    /* Selection Styles */
    .cal-cell.selected { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }
    .cal-cell.selected .evt-badge { background: rgba(255,255,255,0.2) !important; color: white !important; border-color: transparent !important; }
    
    .cal-cell.in-range { background: rgba(86,182,198,0.15); border-color: rgba(86,182,198,0.3); }
    .cal-cell.range-start, .cal-cell.range-end { background: var(--btn-bg); color: var(--btn-text); }
    
    .evt-badge { font-size: 0.65rem; padding: 0.15rem 0.3rem; border-radius: 0.25rem; margin-bottom: 2px; border-left-width: 2px; }
    
    .cal-mode-btn { padding: 0.4rem 0.75rem; font-size: 0.8rem; border-radius: 0.4rem; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--color-text-muted); cursor: pointer; }
    .cal-mode-btn.active { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>
  <div id="app" class="dash-layout">
    <aside class="dash-sidebar" id="sidebar-container"></aside>
    <div class="dash-main">
      <header class="dash-topbar" id="topbar-container"></header>
      <main class="dash-content">

        <h1 class="text-2xl font-bold mb-1" style="font-family:'Outfit';color:var(--color-text)">Interactive Calendar</h1>
        <p class="text-sm mb-6" style="color:var(--color-text-muted)">Full-size interactive calendar with multi-selection modes.</p>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          
          <div class="dash-card lg:col-span-3">
            <div class="flex items-center justify-between mb-4">
              <div class="flex gap-2">
                <button class="cal-mode-btn active" data-mode="single" onclick="setMode('single')">Single</button>
                <button class="cal-mode-btn" data-mode="range" onclick="setMode('range')">Range</button>
                <button class="cal-mode-btn" data-mode="multi" onclick="setMode('multi')">Multi</button>
              </div>
              <div class="flex gap-2 items-center">
                <button class="btn-secondary btn-sm" onclick="navMonth(-1)">‹ Prev</button>
                <h2 id="cal-month-title" class="text-lg font-bold w-32 text-center" style="font-family:Outfit;color:var(--color-text)"></h2>
                <button class="btn-secondary btn-sm" onclick="navMonth(1)">Next ›</button>
              </div>
            </div>
            
            <div id="full-calendar"></div>
          </div>
          
          <div class="dash-card">
            <h3 class="font-semibold mb-3 pb-2" style="font-family:'Outfit';color:var(--color-text); border-bottom:1px solid var(--glass-border)">Selected Dates</h3>
            <div id="selected-dates-list" class="space-y-2 mb-4 max-h-80 overflow-y-auto">
              <p class="text-xs text-gray-500 italic">No dates selected.</p>
            </div>
            <button class="btn-danger w-full btn-sm" onclick="clearSelection()">Clear Selection</button>
          </div>
          
        </div>
      </main>
    </div>
  </div>
  
  <script src="../js/api.js"></script>
  <script src="js/dashboard-core.js"></script>
  <script>
    let currentDate = new Date();
    let currentMode = 'single'; // single, range, multi
    let selectedDates = []; // For single and multi
    let rangeStart = null;
    let rangeEnd = null;
    
    const events = [
      {date:'2026-05-17',title:'Team Meeting',color:'var(--color-accent)'},
      {date:'2026-05-20',title:'Project Deadline',color:'var(--error)'},
      {date:'2026-05-22',title:'Design Review',color:'var(--success)'},
      {date:'2026-05-25',title:'Sprint Planning',color:'#8B5CF6'}
    ];

    document.addEventListener('DOMContentLoaded', () => {
      initDashboard([{label:'Apps'},{label:'Calendar'}]);
      renderCalendar();
    });

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.cal-mode-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.cal-mode-btn[data-mode="${mode}"]`).classList.add('active');
      clearSelection();
    }

    function clearSelection() {
      selectedDates = [];
      rangeStart = null;
      rangeEnd = null;
      renderCalendar();
      updateSelectedList();
    }

    function onDateClick(ds) {
      if (currentMode === 'single') {
        selectedDates = [ds];
      } else if (currentMode === 'multi') {
        const idx = selectedDates.indexOf(ds);
        if (idx > -1) selectedDates.splice(idx, 1);
        else selectedDates.push(ds);
      } else if (currentMode === 'range') {
        if (!rangeStart || (rangeStart && rangeEnd)) {
          rangeStart = ds;
          rangeEnd = null;
        } else {
          if (new Date(ds) < new Date(rangeStart)) {
            rangeEnd = rangeStart;
            rangeStart = ds;
          } else {
            rangeEnd = ds;
          }
        }
      }
      renderCalendar();
      updateSelectedList();
    }

    function isDateSelected(ds) {
      if (currentMode === 'single' || currentMode === 'multi') {
        return selectedDates.includes(ds);
      }
      return false;
    }

    function isDateInRange(ds) {
      if (currentMode === 'range' && rangeStart && rangeEnd) {
        const d = new Date(ds);
        const s = new Date(rangeStart);
        const e = new Date(rangeEnd);
        return d > s && d < e;
      }
      return false;
    }

    function renderCalendar() {
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      
      document.getElementById('cal-month-title').textContent = `${months[m]} ${y}`;
      
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const today = new Date();
      
      let html = '<div class="cal-grid">';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        html += `<div class="text-center text-xs font-semibold text-gray-500 p-2">${d}</div>`;
      });
      
      for(let i=0; i<firstDay; i++) {
        html += '<div class="cal-cell opacity-50 cursor-default hover:bg-transparent border-transparent"></div>';
      }
      
      for(let d=1; d<=daysInMonth; d++) {
        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
        
        let classes = ['cal-cell'];
        if (isToday) classes.push('is-today');
        if (isDateSelected(ds)) classes.push('selected');
        
        if (currentMode === 'range') {
          if (ds === rangeStart) classes.push('range-start', 'selected');
          if (ds === rangeEnd) classes.push('range-end', 'selected');
          if (isDateInRange(ds)) classes.push('in-range');
        }

        html += `<div class="${classes.join(' ')}" onclick="onDateClick('${ds}')">`;
        html += `<div class="text-xs mb-1">${d}</div>`;
        
        events.filter(e => e.date === ds).forEach(e => {
          html += `<div class="evt-badge" style="background:${e.color}22; color:${e.color}; border-left-color:${e.color}">${e.title}</div>`;
        });
        
        html += '</div>';
      }
      html += '</div>';
      
      document.getElementById('full-calendar').innerHTML = html;
    }

    function updateSelectedList() {
      const list = document.getElementById('selected-dates-list');
      let html = '';
      
      if (currentMode === 'single' || currentMode === 'multi') {
        if (selectedDates.length === 0) {
          html = '<p class="text-xs text-gray-500 italic">No dates selected.</p>';
        } else {
          [...selectedDates].sort().forEach(ds => {
            html += `<div class="text-sm p-2 rounded bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 font-medium">🗓️ ${ds}</div>`;
          });
        }
      } else if (currentMode === 'range') {
        if (!rangeStart) {
          html = '<p class="text-xs text-gray-500 italic">No dates selected.</p>';
        } else {
          html += `<div class="text-sm p-2 rounded bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 font-medium">🛫 Start: ${rangeStart}</div>`;
          if (rangeEnd) {
            html += `<div class="text-sm p-2 rounded bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 font-medium">🛬 End: ${rangeEnd}</div>`;
          } else {
            html += `<div class="text-xs p-2 text-blue-500 italic">Select end date...</div>`;
          }
        }
      }
      list.innerHTML = html;
    }

    window.navMonth = function(d) {
      currentDate.setMonth(currentDate.getMonth() + d);
      renderCalendar();
    };
  </script>
</body>
</html>
