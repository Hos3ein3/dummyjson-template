<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — DummyStore</title>
  <meta name="description" content="Set a new password for your DummyStore account.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],heading:['Outfit','sans-serif']}}}}</script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .strength-bar{display:flex;gap:4px;margin-top:0.4rem}
    .strength-segment{flex:1;height:4px;border-radius:2px;background:var(--glass-bg);transition:background 0.3s}
  </style>
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div id="navbar-container"></div>

  <section class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8 fade-in">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: var(--btn-bg);">
          <span style="color: var(--btn-text); font-weight:800; font-size:1.5rem; font-family:'Outfit',sans-serif;">D</span>
        </div>
        <h1 class="text-3xl font-bold" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Reset Password</h1>
        <p class="mt-2 text-sm" style="color: var(--color-text-muted);">Create a new password for your account</p>
      </div>

      <!-- Reset Form -->
      <div class="glass-card rounded-2xl p-6 md:p-8 fade-in" id="reset-form-card">
        <form onsubmit="handleResetPassword(event)">
          <!-- New Password -->
          <div class="mb-5">
            <label class="block text-sm font-medium mb-2" style="color: var(--color-text);">New Password</label>
            <div class="relative">
              <input type="password" id="reset-password" placeholder="Min 6 characters" class="glass-input pr-12" required minlength="6" oninput="updateResetStrength(this)">
              <button type="button" onclick="toggleResetVis('reset-password',this)" class="absolute right-3 top-1/2 -translate-y-1/2" style="color:var(--color-text-muted);background:none;border:none;cursor:pointer">👁</button>
            </div>
            <div class="strength-bar mt-2" id="reset-strength">
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
              <div class="strength-segment"></div>
            </div>
            <div class="flex justify-between mt-1">
              <span class="text-xs font-semibold" id="reset-strength-label"></span>
              <span class="text-xs" style="color:var(--color-text-muted)">Use uppercase, numbers & symbols</span>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="mb-5">
            <label class="block text-sm font-medium mb-2" style="color: var(--color-text);">Confirm Password</label>
            <input type="password" id="reset-confirm" placeholder="Repeat your new password" class="glass-input" required oninput="checkResetMatch()">
            <p id="reset-match-msg" class="text-xs mt-1 hidden" style="color:var(--error)">Passwords do not match</p>
          </div>

          <div id="reset-error" class="hidden mb-4 p-3 rounded-xl text-sm" style="background:rgba(239,68,68,0.1);color:var(--error);border:1px solid rgba(239,68,68,0.2)"></div>

          <button type="submit" id="reset-btn" class="btn-primary w-full py-3 rounded-xl text-sm">
            <span id="reset-btn-text">Reset Password</span>
            <span id="reset-spinner" class="hidden">
              <svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            </span>
          </button>
        </form>
      </div>

      <!-- Success Card -->
      <div class="glass-card rounded-2xl p-6 md:p-8 fade-in hidden" id="reset-success-card">
        <div class="text-center">
          <div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: rgba(16,185,129,0.12);">
            <span class="text-3xl">✅</span>
          </div>
          <h2 class="text-xl font-bold mb-2" style="font-family:'Outfit'; color: var(--color-text);">Password Reset!</h2>
          <p class="text-sm mb-6" style="color: var(--color-text-muted);">Your password has been successfully updated. You can now login with your new password.</p>
          <a href="login.html" class="btn-primary rounded-xl inline-flex py-2.5 px-8 text-sm">Go to Login</a>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script>
    function toggleResetVis(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function updateResetStrength(inp) {
      const pw = inp.value;
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      score = Math.min(score, 4);

      const colors = ['var(--error)', 'var(--error)', 'var(--star)', 'var(--success)', 'var(--success)'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const segments = document.querySelectorAll('#reset-strength .strength-segment');
      segments.forEach((s, i) => { s.style.background = i < score ? colors[score] : 'var(--glass-bg)'; });
      const label = document.getElementById('reset-strength-label');
      label.textContent = labels[score] || '';
      label.style.color = colors[score];
    }

    function checkResetMatch() {
      const pw = document.getElementById('reset-password').value;
      const conf = document.getElementById('reset-confirm').value;
      const msg = document.getElementById('reset-match-msg');
      if (!conf) { msg.classList.add('hidden'); return; }
      if (pw !== conf) { msg.classList.remove('hidden'); msg.textContent = 'Passwords do not match'; msg.style.color = 'var(--error)'; }
      else { msg.classList.remove('hidden'); msg.textContent = '✓ Passwords match'; msg.style.color = 'var(--success)'; }
    }

    function handleResetPassword(event) {
      event.preventDefault();
      const pw = document.getElementById('reset-password').value;
      const conf = document.getElementById('reset-confirm').value;
      const errorEl = document.getElementById('reset-error');
      const btnText = document.getElementById('reset-btn-text');
      const spinner = document.getElementById('reset-spinner');

      errorEl.classList.add('hidden');

      if (pw.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; errorEl.classList.remove('hidden'); return; }
      if (pw !== conf) { errorEl.textContent = 'Passwords do not match.'; errorEl.classList.remove('hidden'); return; }

      btnText.classList.add('hidden');
      spinner.classList.remove('hidden');

      setTimeout(() => {
        btnText.classList.remove('hidden');
        spinner.classList.add('hidden');
        document.getElementById('reset-form-card').classList.add('hidden');
        document.getElementById('reset-success-card').classList.remove('hidden');
        showToast('Password reset successfully!', 'success');
      }, 1500);
    }
  </script>
</body>
</html>
