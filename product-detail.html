<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail — DummyStore</title>
  <meta name="description" content="View product details, reviews, and pricing.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], heading: ['Outfit','sans-serif'] } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div id="navbar-container"></div>

  <!-- Breadcrumb -->
  <section class="pt-6 pb-2">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-2 text-sm" style="color: var(--color-text-muted);">
        <a href="index.html" class="hover:underline">Home</a>
        <span>/</span>
        <a href="products.html" class="hover:underline">Products</a>
        <span>/</span>
        <span id="breadcrumb-title" style="color: var(--color-text);">Loading...</span>
      </div>
    </div>
  </section>

  <!-- Product Content -->
  <section class="py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" id="product-content">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Images Skeleton -->
        <div class="glass-card rounded-2xl p-6">
          <div class="skeleton h-80 mb-4 rounded-xl"></div>
          <div class="flex gap-3">
            <div class="skeleton h-16 w-16 rounded-lg"></div>
            <div class="skeleton h-16 w-16 rounded-lg"></div>
            <div class="skeleton h-16 w-16 rounded-lg"></div>
          </div>
        </div>
        <!-- Details Skeleton -->
        <div class="glass-card rounded-2xl p-6">
          <div class="skeleton h-6 w-1/3 mb-3"></div>
          <div class="skeleton h-8 w-3/4 mb-4"></div>
          <div class="skeleton h-4 w-full mb-2"></div>
          <div class="skeleton h-4 w-full mb-2"></div>
          <div class="skeleton h-4 w-2/3 mb-6"></div>
          <div class="skeleton h-12 w-40"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Reviews -->
  <section class="py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-2xl font-bold mb-6" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Customer Reviews</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="reviews-container">
        <div class="glass-card rounded-xl p-5"><div class="skeleton h-4 w-1/2 mb-2"></div><div class="skeleton h-3 w-full mb-1"></div><div class="skeleton h-3 w-3/4"></div></div>
        <div class="glass-card rounded-xl p-5"><div class="skeleton h-4 w-1/2 mb-2"></div><div class="skeleton h-3 w-full mb-1"></div><div class="skeleton h-3 w-3/4"></div></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script src="js/product-detail.js"></script>
</body>
</html>
