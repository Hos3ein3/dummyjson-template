<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes — DummyStore</title>
  <meta name="description" content="Explore delicious recipes. Search, filter by meal type, and find your next favorite dish.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], heading: ['Outfit','sans-serif'] } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div id="navbar-container"></div>

  <!-- Header -->
  <section class="pt-8 pb-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="text-3xl md:text-4xl font-bold mb-2 fade-in" style="font-family:'Outfit',sans-serif; color: var(--color-text);">Recipes</h1>
      <p class="text-sm fade-in" style="color: var(--color-text-muted);">
        Showing <span id="results-count">—</span> recipes
      </p>
    </div>
  </section>

  <!-- Search & Filters -->
  <section class="py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="glass-card rounded-2xl p-4 md:p-6 fade-in">
        <!-- Search -->
        <div class="relative mb-4">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--color-text-muted)">${icons.search}</span>
          <input type="text" id="search-input" placeholder="Search recipes..." class="glass-input pl-10" onkeyup="handleRecipeSearch(event)">
        </div>

        <!-- Meal Type Tabs -->
        <div class="flex flex-wrap gap-2 mb-3" id="meal-tabs">
          <span class="chip active" onclick="filterByMeal('')">All</span>
          <span class="chip" onclick="filterByMeal('Breakfast')">Breakfast</span>
          <span class="chip" onclick="filterByMeal('Lunch')">Lunch</span>
          <span class="chip" onclick="filterByMeal('Dinner')">Dinner</span>
          <span class="chip" onclick="filterByMeal('Snack')">Snack</span>
          <span class="chip" onclick="filterByMeal('Side Dish')">Side Dish</span>
          <span class="chip" onclick="filterByMeal('Dessert')">Dessert</span>
          <span class="chip" onclick="filterByMeal('Appetizer')">Appetizer</span>
          <span class="chip" onclick="filterByMeal('Beverage')">Beverage</span>
        </div>

        <!-- Tag chips -->
        <div class="flex flex-wrap gap-2 max-h-24 overflow-y-auto" id="tag-chips"></div>
      </div>
    </div>
  </section>

  <!-- Recipes Grid -->
  <section class="py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="recipes-grid">
        <div class="glass-card rounded-2xl"><div class="skeleton h-48"></div><div class="p-4"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
        <div class="glass-card rounded-2xl"><div class="skeleton h-48"></div><div class="p-4"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
        <div class="glass-card rounded-2xl"><div class="skeleton h-48"></div><div class="p-4"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
        <div class="glass-card rounded-2xl"><div class="skeleton h-48"></div><div class="p-4"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
        <div class="glass-card rounded-2xl"><div class="skeleton h-48"></div><div class="p-4"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
        <div class="glass-card rounded-2xl"><div class="skeleton h-48"></div><div class="p-4"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
      </div>
      <div id="pagination-container"></div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script src="js/recipes.js"></script>
</body>
</html>
