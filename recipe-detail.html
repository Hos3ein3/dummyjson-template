<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Detail — DummyStore</title>
  <meta name="description" content="View recipe details, ingredients, and step-by-step instructions.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], heading: ['Outfit','sans-serif'] } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div id="navbar-container"></div>

  <!-- Breadcrumb -->
  <section class="pt-6 pb-2">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-2 text-sm" style="color: var(--color-text-muted);">
        <a href="index.html" class="hover:underline">Home</a>
        <span>/</span>
        <a href="recipes.html" class="hover:underline">Recipes</a>
        <span>/</span>
        <span id="breadcrumb-title" style="color: var(--color-text);">Loading...</span>
      </div>
    </div>
  </section>

  <!-- Recipe Content -->
  <section class="py-6" id="recipe-content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Hero skeleton -->
      <div class="glass-card rounded-3xl overflow-hidden mb-8">
        <div class="skeleton h-64 md:h-80"></div>
        <div class="p-6"><div class="skeleton h-8 w-1/2 mb-3"></div><div class="skeleton h-4 w-1/3"></div></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script src="js/recipe-detail.js"></script>
</body>
</html>
